<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>404 — Not found</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root { --black:#050505; --green:#3ddc84; --muted:#5a5a5a; --radius:34px; --pill:999px; }
    * { box-sizing: border-box; }
    html, body {
      margin:0; padding:0; width:100%; max-width:100%; overflow-x:hidden;
      background:var(--black); color:var(--black);
      font-family:"Montserrat", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      -webkit-font-smoothing:antialiased; -webkit-text-size-adjust:100%;
    }
    .wrap {
      min-height:100dvh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:clamp(20px,3.3vh,38px); padding:clamp(20px,4vh,40px) 18px;
    }
    .title {
      color:#fff; text-align:center; font-weight:700; line-height:1.2; letter-spacing:.2px;
      font-size:clamp(18px,2.6vw,27px); white-space:pre-line; margin:0; width:min(560px,100%);
    }
    .card {
      width:min(560px,100%); max-width:100%; background:#ffffff; border-radius:var(--radius);
      padding:clamp(34px,5vh,56px) clamp(24px,4vw,44px) clamp(28px,4vh,44px);
      display:flex; flex-direction:column; align-items:center; text-align:center;
      min-height:clamp(420px,62vh,640px); justify-content:center;
      box-shadow:0 18px 50px rgba(0,0,0,.45);
    }
    .big {
      font-weight:800; line-height:.9; letter-spacing:-2px;
      font-size:clamp(96px,21vw,196px); margin:0;
    }
    .sub {
      font-weight:400; line-height:.95; letter-spacing:-1px;
      font-size:clamp(40px,12vw,88px); margin:2px 0 0;
    }
    .msg {
      font-weight:500; font-size:clamp(14px,2.2vw,16px); line-height:1.5; color:var(--muted);
      max-width:360px; margin:clamp(22px,3.2vh,30px) 0 0;
    }
    .btn {
      margin-top:clamp(28px,4.4vh,48px);
      display:inline-block; background:var(--black); color:#fff; text-decoration:none;
      font-weight:700; font-size:15px; letter-spacing:.6px; padding:13px 34px;
      border-radius:var(--pill); transition:background .12s, transform .05s;
    }
    .btn:active { transform:scale(.97); }
    .author {
      color:#fff; font-weight:500; font-size:12.5px; opacity:.85; text-decoration:none;
      cursor:pointer; transition:color .15s, opacity .15s;
    }
    @media (hover:hover) and (pointer:fine) {
      .btn:hover { background:#1e1e1e; }
      .author:hover { color:var(--green); opacity:1; }
    }
    @media (max-width:480px) { .card { border-radius:26px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">Consumer Acceptance of
AI-Driven Customer Service</h1>

    <section class="card">
      <p class="big">404</p>
      <p class="sub">not found</p>
      <p class="msg" id="msg"></p>
      <a class="btn" id="home" href="/thesis-survey/">ANA SAYFA</a>
    </section>

    <a class="author" id="author" href="https://yemreatasayar.com/" target="_blank" rel="noopener"></a>
  </main>

  <script>
    (function () {
      // Pick language: ?lang / /EN/ path / saved survey language, else Turkish.
      var lang = "tr";
      try {
        var p = (new URLSearchParams(location.search).get("lang") || "").toLowerCase();
        if (p === "en" || p === "eng") lang = "en";
        else if (p === "tr") lang = "tr";
        else if (/\/en\/?$/i.test(location.pathname)) lang = "en";
        else if (localStorage.getItem("survey_lang") === "en") lang = "en";
      } catch (e) {}

      var T = {
        tr: {
          msg: "Aradığınız sayfaya şu anda ulaşılamıyor. Lütfen ana sayfaya dönün.",
          btn: "ANA SAYFA",
          author: "hazırlayan Yusuf Emre Atasayar",
        },
        en: {
          msg: "The page you are looking for cannot be reached. Please return to the home page.",
          btn: "HOME",
          author: "by Yusuf Emre Atasayar",
        },
      };
      var t = T[lang];
      document.documentElement.lang = lang;
      document.getElementById("msg").textContent = t.msg;
      document.getElementById("home").textContent = t.btn;
      document.getElementById("home").href = "/thesis-survey/" + (lang === "en" ? "?lang=en" : "");
      document.getElementById("author").textContent = t.author;
    })();
  </script>
</body>
</html>
